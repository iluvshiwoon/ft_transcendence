server {
    listen 8080;

    server_name 4thewin;

    # The `resolver` directive is set at http {} level in nginx.conf by the
    # image's own startup script (/docker-entrypoint.d/91-update-resolver.sh),
    # which reads /etc/resolv.conf and substitutes the actual nameserver +
    # the RESOLVER_CONFIG env var passed from compose.yml. That gives us a
    # cross-runtime resolver — Docker (127.0.0.11) and Podman + aardvark-dns
    # (whatever IP netavark hands the container, never 127.0.0.11). Inherited
    # into this server block — no per-server resolver here.
    #
    # `valid=10s` (set via RESOLVER_CONFIG) re-resolves at most every 10s —
    # important because container IPs change on every recreate
    # (`compose up -d --build server` gives the server container a new IP);
    # without re-resolution nginx caches the old IP forever and returns 502
    # until mod_security itself is restarted.

    # Variable upstreams force nginx to use the resolver per-request.
    # A literal hostname in proxy_pass would be resolved once at config-
    # load time and cached forever, defeating the resolver entirely.
    set $upstream_server "server:3000";
    set $upstream_web    "web:4321";

    location /socket.io {
        proxy_pass http://$upstream_server;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://$upstream_server;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads {
        # Avatar files served by the server's @fastify/static plugin.
        # Without this block the path falls through to the / handler and
        # gets proxied to the web container, which 404s.
        proxy_pass http://$upstream_server;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://$upstream_web;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
