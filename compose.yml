version: "3.8"
services:
  postgres:
    image: docker.io/library/postgres:17-alpine3.23
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_transcendance"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: postgres_transcendance
      POSTGRES_USER: postgres_transcendance
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped

  # app:
