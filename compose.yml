  version: "3.8"
  services:
    postgres:
      image: docker.io/library/postgres:17-alpine3.23
      container_name: postgres
      command: >
        sh -c "
        until [ -f /vault/file/.db_pass ]; do
          echo 'En attente du secret PostgreSQL...';
          sleep 1;
        done;
        export POSTGRES_PASSWORD=$$(cat /vault/file/.db_pass);
        rm -f /vault/file/.db_pass;
        docker-entrypoint.sh postgres;"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres_transcendence"]
        interval: 5s
        timeout: 5s
        retries: 15
        start_period: 15s
      environment:
        POSTGRES_DB: postgres_transcendance
        POSTGRES_USER: postgres_transcendance
      volumes:
        - pgdata:/var/lib/postgresql/data
        - vdata:/vault/file
      depends_on:
        vault_server:
          condition: service_healthy
      networks:
        - backend
      restart: unless-stopped

    vault_server:
      image: docker.io/hashicorp/vault:1.20
      container_name: vault_server
      command: server
      ports:
        - "8200:8200"
      volumes:
        - ./vault/config:/vault/config
        - vlogs:/vault/logs
        - vdata:/vault/file
      networks:
        - backend
      restart: unless-stopped
      healthcheck:
        test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200; EXIT_CODE=$$?; [ $$EXIT_CODE -eq 0 ] || [ $$EXIT_CODE -eq 2 ] || { [ $$EXIT_CODE -eq 1 ] && vault status -address=http://127.0.0.1:8200 2>&1 | grep -q 'Initialized[[:space:]]\\+false'; }"]
        interval: 5s
        timeout: 5s
        retries: 10
        start_period: 10s

    vault_init:
      image: docker.io/hashicorp/vault:1.20
      container_name: vault_init
      depends_on:
        vault_server:
          condition: service_healthy
      command: sh /vault/scripts/init.sh
      volumes:
        - ./vault/scripts:/vault/scripts
        - vdata:/vault/file
      networks:
        - backend

    vault_unseal:
      image: docker.io/hashicorp/vault:1.20
      container_name: vault_unseal
      depends_on:
        vault_server:
          condition: service_healthy
      command: sh /vault/scripts/unseal.sh
      volumes:
        - ./vault/scripts:/vault/scripts
        - vdata:/vault/file 
      networks:
        - backend
      restart: on-failure

    server:
      container_name: server
      build:
        context: .
        dockerfile: containerfile
        target: prod-server
      depends_on:
        postgres:
          condition: service_healthy
        vault_server:
          condition: service_healthy
      environment:
        DB_HOST: postgres
        DB_NAME: postgres_transcendance
        DB_USER: postgres_transcendance
        VAULT_ADDR: http://vault_server:8200
      # ports:
      #   - "3000:3000"
      volumes:
        - vdata:/vault/file
      networks:
          - backend
      restart: unless-stopped

    web:
      container_name: web
      build:
        context: .
        dockerfile: containerfile
        target: prod-web
      depends_on:
        - server
      environment:
        - BACKEND_URL=http://server:3000
        - HOST=0.0.0.0
        - PORT=4321
      # ports:
      #   - "4321:4321"
      networks:
        - backend
        - frontend
      restart: unless-stopped

    mod_security:
      image: docker.io/owasp/modsecurity-crs:4.25.0-nginx-lts
      container_name: mod_security
      user: root
      command: >
        sh -c "chown nginx:nginx /var/log/nginx/error.log && 
        /docker-entrypoint.sh nginx -g 'daemon off;'"
      ports:
        - "8080:8080" # PORT_EXTERIEUR:PORT_INTERIEUR
      environment:
        - ACCESS_LOG=/var/log/nginx/access.log
        - SERVER_NAME=4thewin
        - SERVER_TOKENS=off
        - PARANOIA=2
        - MODSEC_RULE_ENGINE=ON
        - MODSEC_AUDIT_LOG=/var/log/nginx/modsec_audit.log
        - ERRORLOG=/var/log/nginx/modsec_error.log
        - BACKEND=web:4321 
        - ALLOWED_METHODS=GET POST PUT HEAD
      depends_on:
        - server
        - web
      volumes:
        - ./waf/default.conf:/etc/nginx/templates/conf.d/default.conf.template
        # - ./waf/logs:/var/log/nginx
      networks:
        - frontend
        - backend
      stop_signal: SIGTERM
      restart: unless-stopped

  volumes:
    pgdata:
    vdata:
    vlogs:

  networks:
    backend:
    frontend:
