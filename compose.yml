  #     DB_PASSWORD: ${DB_PASSWORD}
  #     JWT_SECRET: ${JWT_SECRET}
  #   networks:
  #       - backend
  #       - frontend
  #   restart: unless-stopped

volumes:
  pgdata:

networks:
  backend:
  frontend:
